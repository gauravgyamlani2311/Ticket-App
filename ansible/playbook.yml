---
- name: Local DevOps Environment Recovery
  hosts: localhost
  connection: local
  become: yes
  tasks:
    # ... (rest of your tasks remain the same)
    - name: Update apt and install dependencies
      apt:
        name: [curl, socat, conntrack, git]
        update_cache: yes
        state: present

    - name: Install Docker
      shell: curl -fsSL https://get.docker.com | sh && usermod -aG docker {{ ansible_user }}

    - name: Install Minikube & kubectl
      shell: |
        curl -Lo minikube https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64 && chmod +x minikube && mv minikube /usr/local/bin/
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" && chmod +x kubectl && mv kubectl /usr/local/bin/

    - name: Create Socat Systemd Service
      copy:
        dest: /etc/systemd/system/socat-bridge.service
        content: |
          [Unit]
          Description=Socat Minikube Bridge
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/bin/socat TCP-LISTEN:8081,fork,reuseaddr TCP:192.168.49.2:30007
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Start Socat Service
      systemd:
        name: socat-bridge
        enabled: yes
        state: started
    
    - name: Install Jenkins GPG Key
      apt_key:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
        state: present

    - name: Add Jenkins Repository
      apt_repository:
        repo: deb https://pkg.jenkins.io/debian-stable binary/
        state: present

    - name: Install Java and Jenkins
      apt:
        name: [openjdk-17-jdk, jenkins]
        update_cache: yes
        state: present

    - name: Ensure Jenkins is in the Docker group
      user:
        name: jenkins
        groups: docker
        append: yes

    - name: Start and Enable Jenkins
      systemd:
        name: jenkins
        enabled: yes
        state: started