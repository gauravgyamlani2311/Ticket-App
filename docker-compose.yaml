version: '3.8'

services:
  # Web Application Service
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ticket-web
    ports:
      - "8081:80"
    environment:
      - DB_HOST=db
      - DB_NAME=ticket_db
      - DB_USER=root
      - DB_PASS=password
    depends_on:
      db:
        condition: service_healthy

  # Database Service
  db:
    image: mysql:8.0
    container_name: ticket-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ticket_db
    volumes:
      - db_data:/var/lib/mysql
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./app/db/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  db_data: